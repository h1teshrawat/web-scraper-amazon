services:
  - type: web
    name: amazon-product-scraper-api
    plan: free
    runtime: docker
    rootDir: backend
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ALLOWED_ORIGINS
        sync: false
      - key: REQUEST_TIMEOUT_MS
        value: 30000
      - key: SCRAPER_RETRY_ATTEMPTS
        value: 3
      - key: MAX_CONCURRENT_SCRAPES
        value: 2
      - key: LOG_LEVEL
        value: INFO
